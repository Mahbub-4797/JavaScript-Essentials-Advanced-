<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling: (click event)</title>

    <!-- main css -->
     <link rel="stylesheet" href="/css/styles.css">
    
</head>
<body>
    <h1>Event Handling</h1>

    <!-- for click event -->
    <div>
        <button id="clickButton">Click Me</button>
        <p id="message"></p>
    </div>

    <!-- hover events -->
     <div id="hoverDiv">Hover Over Me</div>

    <!-- 3. Handling Keyboard Events (Keydown and Keyup) -->
     <div style="margin-top: 10px;">
        <input type="text" id="inputFeild" placeholder="Type something...">
        <p id="keyMessage"></p>
     </div>

    <!-- js script -->
     <script src="/js/main.js"></script>
    
</body>
</html>
