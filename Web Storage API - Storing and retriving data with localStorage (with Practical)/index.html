<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage API Example</title>

    <!-- main css -->
     <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <section class="container">
        <h1>Save Form Data with Local Storage</h1>
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Name: </label>
                <input type="text" name="name" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">Email: </label>
                <input type="email" name="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="message">Message: </label>
                <textarea name="message" id="message" placeholder="Enter your message"></textarea>
            </div>

            <div class="form-buttons">
                <button type="submit" id="saveData" class="btn save">Save Data</button>
                <button type="reset" id="clearData" class="btn clear">Clear Data</button>
            </div>
        </form>
    </section>
    
    <!-- JavaScript -->
     <script src="/js/main.js"></script>
</body>
</html>
